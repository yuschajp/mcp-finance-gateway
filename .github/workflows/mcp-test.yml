name: MCP Gateway Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-gateway:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System and MCP Dependencies
      run: |
        python -bin -m pip install --upgrade pip
        pip install "mcp[cli]" ruff

    - name: Run Syntax and Style Linter
      run: |
        # Ensures clean, enterprise-grade Python layout formatting
        ruff check register_broker_session.py test_run.py --ignore E501

    - name: Execute End-to-End Integration Test
      run: |
        # Runs the direct Python test harness to verify workspace isolation
        python test_run.py
